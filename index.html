<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fff4e7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sakura Seoul" />
  <title>Sakura • Seoul Journal</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="App navigation">
      <div class="brand">
        <div class="brand-flower">🌸</div>
        <h1>Sakura • Seoul</h1>
        <h2>Journal</h2>
        <p>written together</p>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-view="itinerary">▣ <span>Plan</span></button>
        <button class="nav-item" data-view="journey">⌘ <span>Journey</span></button>
        <button class="nav-item" data-view="readiness">⌖ <span>Trip Readiness</span><em>73%</em></button>
        <button class="nav-item" data-view="stay">⌂ <span>Stay</span></button>
        <button class="nav-item" data-view="budget">⌬ <span>Budget</span></button>
        <button class="nav-item" data-view="collections">◫ <span>Collections</span></button>
        <button class="nav-item" data-view="tinyjoys">♡ <span>Tiny Joys</span></button>
        <button class="nav-item" data-view="memories">▧ <span>Memories</span></button>
        <button class="nav-item" data-view="wallet">▭ <span>Wallet</span></button>
      </nav>

      <div class="sidebar-card couple">
        <div class="avatar">AR</div>
        <div>
          <strong>Aakash & Riya</strong>
          <small>Oct 7 – Oct 25, 2026</small>
        </div>
      </div>

      <div class="sidebar-card weather">
        <div class="sun">☀</div>
        <div>
          <small>Osaka</small>
          <strong>24°C</strong>
          <small>Sunny · gentle day</small>
        </div>
      </div>
    </aside>

    <main class="page">
      <div class="topbar">
        <button class="text-button">← Back to Osaka</button>
        <div class="top-actions">
          <button aria-label="Search">⌕</button>
          <button aria-label="Favorite">♡</button>
          <button aria-label="More">⋯</button>
        </div>
      </div>

      <section id="module-root"></section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
